<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <!-- full-bleed background so the icon works as 'maskable' (safe zone = centre 80%) -->
  <rect width="512" height="512" fill="#171d30"/>
  <rect width="512" height="512" fill="url(#vig)"/>
  <defs>
    <radialGradient id="vig" cx="50%" cy="42%" r="65%">
      <stop offset="0" stop-color="#222b46"/>
      <stop offset="1" stop-color="#13120f"/>
    </radialGradient>
    <radialGradient id="node" cx="40%" cy="35%" r="75%">
      <stop offset="0" stop-color="#f3e6c2"/>
      <stop offset="1" stop-color="#cda64f"/>
    </radialGradient>
  </defs>
  <!-- six-stance ring -->
  <g transform="translate(256 256)">
    <circle r="150" fill="none" stroke="#cda64f" stroke-width="6" opacity=".35"/>
    <!-- 6 nodes at -90 + i*60 degrees -->
    <g>
      <circle cx="0"     cy="-150" r="34" fill="url(#node)" stroke="#13120f" stroke-width="4"/>
      <circle cx="129.9" cy="-75"  r="34" fill="url(#node)" stroke="#13120f" stroke-width="4"/>
      <circle cx="129.9" cy="75"   r="34" fill="url(#node)" stroke="#13120f" stroke-width="4"/>
      <circle cx="0"     cy="150"  r="34" fill="url(#node)" stroke="#13120f" stroke-width="4"/>
      <circle cx="-129.9" cy="75"  r="34" fill="url(#node)" stroke="#13120f" stroke-width="4"/>
      <circle cx="-129.9" cy="-75" r="34" fill="url(#node)" stroke="#13120f" stroke-width="4"/>
    </g>
    <!-- centre seal -->
    <circle r="50" fill="#cf4130" stroke="#13120f" stroke-width="5"/>
    <text x="0" y="22" font-family="Georgia, 'Shippori Mincho', serif" font-size="64" font-weight="800"
          text-anchor="middle" fill="#efe7d6">六</text>
  </g>
</svg>
